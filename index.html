<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Voice to Action — Secure Global Civic Platform</title>
    <meta name="description" content="The world&#39;s first verified civic platform. Sign petitions, vote on policies, hold governments and corporations accountable. Real voices. Real change.">
    <meta name="author" content="Voice to Action" />
    <meta name="keywords" content="petitions, polls, civic engagement, accountability, democracy, global opinion, public figures, verified voting" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="color-scheme" content="light dark" />

    <!-- Open Graph / Facebook sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%SITE_ORIGIN%/" />
    
    
    <meta property="og:image" content="%SITE_ORIGIN%/og-image.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Voice to Action" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VoiceToAction" />
    
    
    <meta name="twitter:image" content="%SITE_ORIGIN%/og-image.png">

    <!-- PWA / App -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Voice to Action" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Structured Data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Voice to Action",
      "url": "%SITE_ORIGIN%",
      "description": "The world's first verified civic platform for petitions, polls, and political accountability.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "%SITE_ORIGIN%/Search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta property="og:title" content="Voice to Action — Secure Global Civic Platform">
  <meta name="twitter:title" content="Voice to Action — Secure Global Civic Platform">
  <meta property="og:description" content="The world&#39;s first verified civic platform. Sign petitions, vote on policies, hold governments and corporations accountable. Real voices. Real change.">
  <meta name="twitter:description" content="The world&#39;s first verified civic platform. Sign petitions, vote on policies, hold governments and corporations accountable. Real voices. Real change.">
</head>
  <body>
    <noscript>
      <p style="font-family:sans-serif;text-align:center;padding:2rem">
        Voice to Action requires JavaScript. Please enable it to continue.
      </p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
